name: desktop-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - "frontend/**"
      - "backend/**"
      - "agents/**"
      - "skills/**"
      - "config.example.yaml"
      - "extensions_config.example.json"
      - ".github/workflows/desktop-build.yml"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Desktop
            os: macos-14
            build_command: npm --prefix desktop run dist:mac
            artifact_glob: desktop/dist/*.dmg
          - label: Windows Desktop
            os: windows-2022
            build_command: npm --prefix desktop run dist:win
            artifact_glob: desktop/dist/*.exe
          - label: Linux Desktop
            os: ubuntu-24.04
            build_command: npm --prefix desktop run dist:linux
            artifact_glob: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup frontend Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install macOS OCR dependency
        if: runner.os == 'macOS'
        run: brew install tesseract

      - name: Build desktop artifact
        run: ${{ matrix.build_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
