<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Starting Up</title>
    <style>
        :root {
            --primary: #10b981;
            --accent: #3b82f6;
            --bg: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(59, 130, 246, 0.05) 100%);
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: #1e293b;
        }

        .status {
            font-size: 15px;
            color: #475569;
            margin: 10px 0;
        }

        .sub-status {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }

        .dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 15px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        #log-info {
            position: absolute;
            bottom: 30px;
            font-size: 10px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="logo-box">
            <img src="icon.png" class="icon" alt="❄️">
        </div>
        <div class="title">Aura AI</div>
        <div class="status">正在启动本地工作区...</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="sub-status">正在准备环境</div>
    </div>
    <div id="log-info"></div>

    <script>
        // Failsafe: Ensure everything shows up even if animations fail
        setTimeout(() => {
            document.getElementById('main-container').style.opacity = '1';
        }, 1500);
    </script>
</body>
</html>
