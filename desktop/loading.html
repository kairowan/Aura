<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Starting Up</title>
    <style>
        :root {
            --primary: #10b981;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --bg-light: #ffffff;
        }

        body {
            background: radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.2), transparent 45%),
                        radial-gradient(circle at 90% 15%, rgba(59, 130, 246, 0.2), transparent 45%),
                        radial-gradient(circle at 50% 85%, rgba(139, 92, 246, 0.15), transparent 50%),
                        var(--bg-light);
            color: #020617;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient Glow Backdrop */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Glass Container */
        .glass-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05),
                        0 0 100px rgba(16, 185, 129, 0.15);
            animation: container-entry 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes container-entry {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Logo and Aura Ring */
        .logo-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        .icon {
            font-size: 64px;
            z-index: 2;
            position: relative;
            filter: drop-shadow(0 0 25px rgba(16, 185, 129, 0.4));
        }

        .aura-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            opacity: 0;
            animation: ring-pulse 3s infinite;
        }

        .aura-ring-2 {
            animation-delay: 1.5s;
        }

        @keyframes ring-pulse {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        /* Typography */
        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            animation: fade-in 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .status {
            font-size: 15px;
            color: #1e293b;
            margin: 0;
            letter-spacing: 0.01em;
            animation: fade-in 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        .sub-status {
            font-size: 12px;
            color: #64748b;
            margin-top: 12px;
            animation: fade-in 1s ease-out 0.6s forwards;
            opacity: 0;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Dots */
        .dots {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: dot-loading 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dot-loading {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.2; }
            40% { transform: scale(1.2); opacity: 1; filter: blur(1px); }
        }

    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="glass-container">
        <div class="logo-wrapper">
            <div class="aura-ring"></div>
            <div class="aura-ring aura-ring-2"></div>
            <div class="icon">💠</div>
        </div>

        <div class="title">Aura AI</div>
        
        <p class="status">正在同步智能引擎与知识库...</p>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <p class="sub-status">初次启动可能需要一分钟时间</p>
    </div>
</body>
</html>
